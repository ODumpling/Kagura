name: Release Kagura.Cli

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # for creating the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # MinVer needs full history + tags to compute the version.
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/kagura-web/package-lock.json

      - name: Build React SPA
        working-directory: web/kagura-web
        run: |
          npm ci
          npm run build

      - name: Restore
        run: dotnet restore

      - name: Pack Kagura.Cli
        run: dotnet pack src/Kagura.Cli -c Release -p:RunNpmBuild=true -o ./nupkgs

      - name: Publish to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::error::NUGET_API_KEY secret is not set. Add it under Settings → Secrets and variables → Actions before tagging a release." >&2
            exit 1
          fi
          dotnet nuget push ./nupkgs/Kagura.Cli.*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            ./nupkgs/Kagura.Cli.*.nupkg \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
